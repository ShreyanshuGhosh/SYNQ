services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-synq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-synq_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-synq_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-synq}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Two Redis instances: cache (6379) and queue (6380).
  # Kept separate so task backlog never evicts cached context.
  redis_cache:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_cache_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis_queue:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_queue_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Phase 4 — vector DB for RAG retrieval and rolling-context recall.
  # Two collections live here: `messages` (one point per chat turn,
  # 1024-dim mistral-embed) and `file_chunks` (one point per chunk
  # produced by the Phase 3 parse pipeline, same embedding model).
  qdrant:
    image: qdrant/qdrant:v1.12.4
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST + gRPC HTTP
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    # Qdrant's slim image has no curl/wget; the bash /dev/tcp test is
    # POSIX-portable and just checks the REST port is accepting sockets.
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-synq_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-synq_minio_password}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Phase 6 — distributed tracing UI for the API + Celery workers.
  # All-in-one image bundles the collector + UI; OTLP gRPC on 4317,
  # web UI on 16686. Free, no auth, localhost-only.
  jaeger:
    image: jaegertracing/all-in-one:1.57
    restart: unless-stopped
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC ingest
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  # One-shot bootstrap: ensures the synq-files bucket exists with
  # private ACL so the API can write without first touching the console.
  minio_bootstrap:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-synq_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-synq_minio_password}
      S3_BUCKET: ${S3_BUCKET:-synq-files}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$S3_BUCKET &&
      mc anonymous set none local/$$S3_BUCKET &&
      echo 'synq: bucket $$S3_BUCKET ready'
      "
    restart: "no"

volumes:
  postgres_data:
  redis_cache_data:
  redis_queue_data:
  minio_data:
  qdrant_data:
